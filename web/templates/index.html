<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hệ thống Chấm công</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
    background: #f1f5f9; color: #1e293b; line-height: 1.5;
  }
  header {
    background: linear-gradient(135deg, #1e3a8a, #2563eb);
    color: #fff; padding: 20px 28px; display: flex;
    align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
  }
  header h1 { font-size: 22px; font-weight: 700; }
  header .sub { font-size: 13px; opacity: .85; margin-top: 2px; }
  .controls { display: flex; align-items: center; gap: 10px; font-size: 13px; }
  .controls button {
    background: rgba(255,255,255,.2); color: #fff; border: 1px solid rgba(255,255,255,.35);
    padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 600;
  }
  .controls button:hover { background: rgba(255,255,255,.32); }
  .controls label { display: flex; align-items: center; gap: 6px; cursor: pointer; }

  .wrap { max-width: 1100px; margin: 0 auto; padding: 22px; }

  /* Tabs */
  .tabs { display: flex; gap: 6px; border-bottom: 2px solid #e2e8f0; margin-bottom: 20px; }
  .tab {
    padding: 11px 20px; cursor: pointer; font-weight: 600; font-size: 14px; color: #64748b;
    border-bottom: 3px solid transparent; margin-bottom: -2px;
  }
  .tab.active { color: #2563eb; border-bottom-color: #2563eb; }

  /* Cards */
  .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .card {
    background: #fff; border-radius: 14px; padding: 18px 20px;
    box-shadow: 0 1px 3px rgba(0,0,0,.08); border-left: 4px solid #4f7cff;
  }
  .card .icon { font-size: 22px; }
  .card .value { font-size: 30px; font-weight: 800; margin: 4px 0; }
  .card .label { font-size: 13px; color: #64748b; }

  /* Charts */
  .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  @media (max-width: 760px){ .chart-row { grid-template-columns: 1fr; } }
  .panel { background: #fff; border-radius: 14px; padding: 18px 20px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .panel h3 { font-size: 15px; margin-bottom: 16px; color: #334155; }
  .bars { display: flex; align-items: flex-end; gap: 4px; height: 180px; }
  .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; }
  .bar {
    width: 70%; background: linear-gradient(180deg, #60a5fa, #2563eb);
    border-radius: 4px 4px 0 0; min-height: 2px; position: relative; transition: height .3s;
  }
  .bar .v { position: absolute; top: -18px; left: 50%; transform: translateX(-50%); font-size: 11px; color: #475569; font-weight: 600; }
  .bar-label { font-size: 10px; color: #94a3b8; margin-top: 6px; white-space: nowrap; }

  /* Tables */
  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  th { background: #1e3a8a; color: #fff; text-align: left; padding: 12px 16px; font-size: 13px; }
  td { padding: 11px 16px; border-top: 1px solid #eef2f7; font-size: 14px; }
  tr:hover td { background: #f8fafc; }
  .badge { padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
  .b-in { background: #dcfce7; color: #166534; }
  .b-out { background: #dbeafe; color: #1e40af; }
  .muted { color: #cbd5e1; }
  .empty { text-align: center; color: #94a3b8; padding: 40px; background: #fff; border-radius: 12px; }
  .hidden { display: none; }
  .updated { font-size: 12px; color: #94a3b8; margin-top: 14px; text-align: right; }
  .err { background: #fef2f2; color: #b91c1c; padding: 16px; border-radius: 10px; border: 1px solid #fecaca; }
</style>
</head>
<body>
<header>
  <div>
    <h1>🎯 Hệ thống Chấm công bằng Nhận diện Khuôn mặt</h1>
    <div class="sub">Dashboard quản lý — Check-in / Check-out</div>
  </div>
  <div class="controls">
    <label><input type="checkbox" id="auto"> Tự làm mới (5s)</label>
    <button onclick="loadData()">🔄 Làm mới</button>
  </div>
</header>

<div class="wrap">
  <div id="error-box"></div>

  <div class="tabs">
    <div class="tab active" data-tab="overview">📊 Tổng quan</div>
    <div class="tab" data-tab="history">📋 Lịch sử chấm công</div>
    <div class="tab" data-tab="employees">👥 Nhân viên</div>
  </div>

  <!-- TAB: Overview -->
  <div id="tab-overview">
    <div class="cards" id="cards"></div>
    <div class="chart-row">
      <div class="panel"><h3 id="chart1-title">—</h3><div class="bars" id="chart1"></div></div>
      <div class="panel"><h3 id="chart2-title">—</h3><div class="bars" id="chart2"></div></div>
    </div>
  </div>

  <!-- TAB: History -->
  <div id="tab-history" class="hidden">
    <div id="history-content"></div>
  </div>

  <!-- TAB: Employees -->
  <div id="tab-employees" class="hidden">
    <div id="employees-content"></div>
  </div>

  <div class="updated" id="updated"></div>
</div>

<script>
let CURRENT = null;

// Tabs
document.querySelectorAll(".tab").forEach(t => {
  t.onclick = () => {
    document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
    t.classList.add("active");
    ["overview","history","employees"].forEach(name => {
      document.getElementById("tab-"+name).classList.toggle("hidden", name !== t.dataset.tab);
    });
  };
});

function renderBars(elId, titleId, chart) {
  document.getElementById(titleId).textContent = chart.title;
  const max = Math.max(1, ...chart.values);
  const el = document.getElementById(elId);
  el.innerHTML = chart.values.map((v, i) => `
    <div class="bar-col">
      <div class="bar" style="height:${(v / max * 100).toFixed(0)}%">
        ${v > 0 ? `<span class="v">${v}</span>` : ""}
      </div>
      <div class="bar-label">${chart.labels[i]}</div>
    </div>`).join("");
}

function renderCards(cards) {
  document.getElementById("cards").innerHTML = cards.map(c => `
    <div class="card" style="border-left-color:${c.color}">
      <div class="icon">${c.icon}</div>
      <div class="value" style="color:${c.color}">${c.value}</div>
      <div class="label">${c.label}</div>
    </div>`).join("");
}

function renderHistory(d) {
  const box = document.getElementById("history-content");
  if (d.mode === "session") {
    const rows = d.sessions || [];
    if (!rows.length) { box.innerHTML = `<div class="empty">Chưa có phiên chấm công nào.</div>`; return; }
    box.innerHTML = `
      <table><thead><tr>
        <th>Nhân viên</th><th>Ngày</th><th>Giờ vào</th><th>Giờ ra</th><th>Số giờ</th><th>Trạng thái</th>
      </tr></thead><tbody>
      ${rows.map(r => `<tr>
        <td><b>${r.name}</b></td>
        <td>${r.date}</td>
        <td>${r.check_in}</td>
        <td>${r.check_out === "—" ? '<span class="muted">—</span>' : r.check_out}</td>
        <td>${r.hours}</td>
        <td>${r.check_out === "—"
              ? '<span class="badge b-in">🟢 Đang làm</span>'
              : '<span class="badge b-out">🔵 Đã tan ca</span>'}</td>
      </tr>`).join("")}
      </tbody></table>`;
  } else {
    const rows = d.logs || [];
    if (!rows.length) { box.innerHTML = `<div class="empty">Chưa có bản ghi chấm công.</div>`; return; }
    box.innerHTML = `
      <table><thead><tr><th>Nhân viên</th><th>Thời gian</th><th>Độ tương đồng</th></tr></thead><tbody>
      ${rows.map(r => `<tr><td><b>${r.name}</b></td><td>${r.time}</td><td>${r.sim}</td></tr>`).join("")}
      </tbody></table>`;
  }
}

function renderEmployees(emps) {
  const box = document.getElementById("employees-content");
  if (!emps || !emps.length) { box.innerHTML = `<div class="empty">Chưa có dữ liệu nhân viên.</div>`; return; }
  const cols = Object.keys(emps[0]);
  box.innerHTML = `
    <table><thead><tr>${cols.map(c => `<th>${c}</th>`).join("")}</tr></thead><tbody>
    ${emps.map(e => `<tr>${cols.map(c => `<td>${e[c]}</td>`).join("")}</tr>`).join("")}
    </tbody></table>`;
}

async function loadData() {
  try {
    const res = await fetch("/api/data");
    const d = await res.json();
    const errBox = document.getElementById("error-box");
    if (d.error) { errBox.innerHTML = `<div class="err">⚠️ ${d.error}</div>`; return; }
    errBox.innerHTML = "";
    CURRENT = d;
    renderCards(d.overview.cards);
    renderBars("chart1", "chart1-title", d.chart_hour);
    renderBars("chart2", "chart2-title", d.chart_day);
    renderHistory(d);
    renderEmployees(d.employees);
    const now = new Date();
    document.getElementById("updated").textContent =
      `Cập nhật lúc ${now.toLocaleTimeString("vi-VN")} • Chế độ: ${d.mode === "session" ? "Check-in/out" : "Log"} • DB: ${d.db}`;
  } catch (e) {
    document.getElementById("error-box").innerHTML =
      `<div class="err">Không kết nối được tới máy chủ. Kiểm tra app.py có đang chạy không.</div>`;
  }
}

// Auto refresh
let timer = null;
document.getElementById("auto").onchange = (e) => {
  if (e.target.checked) timer = setInterval(loadData, 5000);
  else clearInterval(timer);
};

loadData();
</script>
</body>
</html>
